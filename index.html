<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Special Days Calendar</title>
        <script type="module" src="script.mjs"></script>
    </head>
    <body>
        <header>
            <h1>Special days calendar</h1>
        </header>
        <main>
            <div
                class="calendar-controls"
                role="group"
                aria-label="Calendar navigation">
                <div id="month-select-container">
                    <select
                        name="select-month"
                        id="select-month"
                        aria-label="Month">
                        <option value="" disabled selected>-- MONTH --</option>
                        <option value="January">January</option>
                        <option value="February">February</option>
                        <option value="March">March</option>
                        <option value="April">April</option>
                        <option value="May">May</option>
                        <option value="June">June</option>
                        <option value="July">July</option>
                        <option value="August">August</option>
                        <option value="September">September</option>
                        <option value="October">October</option>
                        <option value="November">November</option>
                        <option value="December">December</option>
                    </select>
                    <select
                        name="select-year"
                        id="select-year"
                        aria-label="Year">
                        <option value="" selected disabled>-- YEAR --</option>
                    </select>
                </div>
                <div id="month-nav-btn-container">
                    <button id="prev-month" aria-label="Previous month">
                        Previous
                    </button>
                    <button id="next-month" aria-label="Next month">
                        Next
                    </button>
                </div>
            </div>
            <div id="calendar-container" role="region" aria-label="Calendar">
                <div id="week-headings">
                    <div>Sunday</div>
                    <div>Monday</div>
                    <div>Tuesday</div>
                    <div>Wednesday</div>
                    <div>Thursday</div>
                    <div>Friday</div>
                    <div>Saturday</div>
                </div>
            </div>
        </main>
    </body>
</html>
